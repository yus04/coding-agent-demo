# Azure Container Instances Deployment Configuration
# This YAML file defines the configuration for deploying the Streamlit TODO app to Azure Container Instances

apiVersion: '2019-12-01'
location: japaneast
name: streamlit-todo-container
properties:
  containers:
  - name: streamlit-todo
    properties:
      image: streamlittodoregistry.azurecr.io/streamlit-todo:latest
      resources:
        requests:
          cpu: 1
          memoryInGb: 1
      ports:
      - port: 8501
        protocol: TCP
      environmentVariables:
      - name: STREAMLIT_SERVER_HEADLESS
        value: 'true'
      - name: STREAMLIT_SERVER_ENABLE_CORS
        value: 'false'
      - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: 'false'
  osType: Linux
  ipAddress:
    type: Public
    ports:
    - protocol: TCP
      port: 8501
    dnsNameLabel: streamlit-todo-app
  imageRegistryCredentials:
  - server: streamlittodoregistry.azurecr.io
    username: streamlittodoregistry
    # Note: Password should be set via Azure CLI or Azure Portal for security
  restartPolicy: Always
tags:
  Environment: Production
  Application: StreamlitTODO